body:
  text: 卷一補亡詩六首序曰晳與司業疇人肄修鄉飲之禮然所詠之詩或有義無辭音樂取節闕而不備于是遙想既往存思在昔補著其文以綴舊制南陔南陔孝子相戒以養也循彼南陔言采其蘭眷戀庭闈心不遑安彼居之子罔或游盤馨爾夕膳絜爾晨飡循彼南陔厥草油油彼居之子色思其柔眷戀庭闈心不遑留馨爾夕膳絜爾晨羞有獺有獺在河之涘淩波赴汨噬魴捕鯉嗷嗷林烏受哺于子養隆敬薄惟禽之似勗增爾虔以介丕祉文選十九詩紀二十三又初學記十七所引缺飡一韻白華白華孝子之絜白也白華朱萼被於幽薄粲粲門子如磨如錯終晨三省匪惰其恪白華絳趺在陵之陬蒨蒨士子涅而不渝竭誠盡敬亹亹忘劬白華玄足在丘之曲堂堂處子無營無欲鮮侔晨葩莫之點辱文選十九初學記十七文章正宗二十九詩紀二十三華黍華黍時和歲豐宜黍稷也黮黮重雲習習和風黍華陵巔麥秀丘中靡田不播九穀斯豐奕奕玄霄濛濛甘霤黍發稠華禾挺其秀靡田不殖九穀斯茂無高不播無下不植芒芒其稼參參其穡蓄我王委充我民食玉燭陽明顯猷翼翼文選十九詩紀二十三由庚由庚萬物得由其道也蕩蕩夷庚物則由之蠢蠢庶類王亦柔之道之既由化之既柔木以秋零草以春抽獸在于草魚躍順流四時遞謝八風代扇纖阿案晷星變其躔五緯不愆六氣無易愔愔我王紹文之跡文選十九詩紀二十三崇丘崇丘萬物得極其高大也瞻彼崇丘其林藹藹植物斯高動類斯大周風既洽王猷允泰漫漫方輿回回洪覆何類不繁何生不茂物極其性人永其壽恢恢大圓茫茫九壤資生仰化于何不養人無道夭物極則長文選十九詩紀二十三由儀由儀萬物之生各得其儀也肅肅君子由儀率性明明后辟仁以為政魚游清沼鳥萃平林濯鱗鼓翼振振其音賓寫爾誠主竭其心時之和矣何思何修文化內輯武功外悠文選十九詩紀二十三
