body:
  text: 附録三日曲水對三日曲水對昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王以三日置酒河曲見金人奉水心之劍曰令君制有西夏乃霸諸侯因此立為曲水二漢相緣皆為盛集謝功曹箋謝功曹箋忝私前主竊作朝右論論男十六可娶女十四可嫁
